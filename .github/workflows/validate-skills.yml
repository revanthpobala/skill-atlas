name: Validate Agentic Skills

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Skill Validator
        # This runs the compiled binary to ensure skills meet atomicity and formatting rules.
        run: npx agentic-skill-validator ./
